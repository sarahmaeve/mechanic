<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mechanic corner logo — stylized arc-reactor / circuit-diagram mark.

  Design:
    • Concentric octagons forming an "arc reactor" core with a filled centre.
    • 8 traces radiating out at 45° intervals.
    • Celeste terminal pads at each trace endpoint.
    • Amber via / junction marks perpendicular to the cardinal traces for
      a bit of warm-accent contrast against the cyan palette.

  Colors match mechanic-config/src/theme.rs:
    electric = #52E8FF, celeste = #ADFFFF, amber = #FFB300

  Rotationally symmetric (8-fold), so it reads correctly in any window corner.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"
     fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- Outer octagonal ring (arc-reactor shell) -->
  <polygon points="128,92 153,103 164,128 153,153 128,164 103,153 92,128 103,103"
           stroke="#52E8FF" stroke-width="3"/>

  <!-- Inner octagonal ring -->
  <polygon points="128,106 144,112 150,128 144,144 128,150 112,144 106,128 112,112"
           stroke="#ADFFFF" stroke-width="2"/>

  <!-- Central core -->
  <circle cx="128" cy="128" r="6" fill="#52E8FF"/>

  <!-- 8 radiating traces from the outer ring to terminal pads -->
  <g stroke="#52E8FF" stroke-width="2">
    <line x1="128" y1="92"  x2="128" y2="28"/>
    <line x1="153" y1="103" x2="199" y2="57"/>
    <line x1="164" y1="128" x2="228" y2="128"/>
    <line x1="153" y1="153" x2="199" y2="199"/>
    <line x1="128" y1="164" x2="128" y2="228"/>
    <line x1="103" y1="153" x2="57"  y2="199"/>
    <line x1="92"  y1="128" x2="28"  y2="128"/>
    <line x1="103" y1="103" x2="57"  y2="57"/>
  </g>

  <!-- Terminal pads -->
  <g fill="#ADFFFF">
    <circle cx="128" cy="28"  r="5"/>
    <circle cx="199" cy="57"  r="5"/>
    <circle cx="228" cy="128" r="5"/>
    <circle cx="199" cy="199" r="5"/>
    <circle cx="128" cy="228" r="5"/>
    <circle cx="57"  cy="199" r="5"/>
    <circle cx="28"  cy="128" r="5"/>
    <circle cx="57"  cy="57"  r="5"/>
  </g>

  <!-- Amber via marks on the four cardinal traces -->
  <g stroke="#FFB300" stroke-width="2">
    <line x1="122" y1="60"  x2="134" y2="60"/>
    <line x1="196" y1="122" x2="196" y2="134"/>
    <line x1="122" y1="196" x2="134" y2="196"/>
    <line x1="60"  y1="122" x2="60"  y2="134"/>
  </g>
</svg>
